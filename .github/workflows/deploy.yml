name: Deploy Network Config

on:
  push:
    branches: [main]
    paths:
      - 'configs/**'

jobs:
  sanity-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate FRR Config Syntax
        run: |
          for f in configs/*/frr.conf; do
            echo "Checking $f..."
            [ -s "$f" ] || (echo "ERROR: $f is empty" && exit 1)
            grep -q "frr version" "$f" || (echo "ERROR: missing frr version in $f" && exit 1)
          done

      - name: Success Message
        run: echo "All configs look good ✅"
